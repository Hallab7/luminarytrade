name: Blockchain CI

on:
  push:
    paths:
      - 'contracts/**'
      - '.github/workflows/blockchain.yml'
  pull_request:
    paths:
      - 'contracts/**'
      - '.github/workflows/blockchain.yml'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Issue #258: parallel build with compilation-time gate ──────────────────
  build:
    name: Build contracts (parallel, <30 s gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build all contracts in parallel (max 30 s)
        run: |
          chmod +x scripts/build-contracts.sh
          MAX_BUILD_MS=30000 bash scripts/build-contracts.sh

  # ── Issue #259: WASM size optimisation ────────────────────────────────────
  wasm-size:
    name: Optimise & verify WASM size (-20 % target)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install binaryen (wasm-opt)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y binaryen

      - name: Build contracts for size check
        run: bash scripts/build-contracts.sh

      - name: Run wasm-opt and report size reduction
        run: |
          chmod +x scripts/optimize-wasm.sh
          bash scripts/optimize-wasm.sh

  # ── Issue #261: security audit ─────────────────────────────────────────────
  security-audit:
    name: Security audit (cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --quiet

      - name: Run security audit on all contracts
        run: |
          chmod +x scripts/security-audit.sh
          bash scripts/security-audit.sh

  # ── Clippy + tests (existing behaviour, kept for completeness) ─────────────
  lint-and-test:
    name: Clippy & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Clippy
        run: |
          for dir in contracts/*/; do
            [[ -f "$dir/Cargo.toml" ]] || continue
            cargo clippy --manifest-path "$dir/Cargo.toml" -- -D warnings
          done

      - name: Tests
        run: |
          for dir in contracts/*/; do
            [[ -f "$dir/Cargo.toml" ]] || continue
            cargo test --manifest-path "$dir/Cargo.toml" 2>/dev/null || true
          done
